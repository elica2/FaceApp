[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && pip uninstall -y opencv-python && pip install opencv-python-headless"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 900
restartPolicyType = "on_failure"

[variables]
DATA_DIR = "/data"
